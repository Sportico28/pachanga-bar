<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #000000;
    --bg-elev: #0F0F0F;
    --bg-watermark: #171717;
    --fg: #FFFFFF;
    --fg-muted: #A8A8A8;
    --fg-dim: #6B6B6B;
    --accent: #DC3550;
    --accent-hover: #E94A65;
    --success: #34D399;
    --warning: #FBBF24;
    --danger: #EF4444;
    --border: #1F1F1F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; }
  body { max-width: 480px; margin: 0 auto; position: relative; padding-bottom: 40px; }

  /* Officieel Bar28 logo via <use> ref (sizing classes onderaan) */

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .lang-switch {
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg);
    padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .lang-switch:hover { border-color: var(--accent); }

  /* Search */
  .search-wrap { padding: 16px 20px; position: relative; }
  .search-input {
    width: 100%; padding: 14px 16px; padding-left: 44px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
    color: var(--fg); font-size: 16px; font-family: inherit;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--fg-dim); }
  .search-icon {
    position: absolute; left: 34px; top: 50%; transform: translateY(-50%);
    color: var(--fg-dim); pointer-events: none;
  }

  /* Categorieën chips */
  .chips { padding: 0 20px 16px; display: flex; gap: 8px; overflow-x: auto; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 8px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
    background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg-muted); cursor: pointer;
    letter-spacing: 0.04em; transition: all 0.15s;
  }
  .chip:hover { color: var(--fg); }
  .chip.active { background: var(--accent); color: var(--fg); border-color: var(--accent); }

  /* Article list */
  .list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; cursor: pointer; transition: transform 0.1s, border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card:active { transform: scale(0.98); }
  .card-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
  .card-title { font-size: 18px; font-weight: 700; margin-top: 6px; }
  .card-summary { font-size: 14px; color: var(--fg-muted); margin-top: 6px; line-height: 1.4; }
  .card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.05); color: var(--fg-dim);
  }

  /* Empty */
  .empty { padding: 40px 20px; text-align: center; color: var(--fg-dim); }

  /* Detail */
  .detail { display: none; }
  .detail.active { display: block; }
  .list-view.hidden { display: none; }
  .back {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
    background: var(--bg-elev); border-radius: 999px; font-size: 13px; cursor: pointer;
    color: var(--fg-muted); margin: 16px 0 0 20px;
  }
  .back:hover { color: var(--accent); }
  .article { padding: 20px; }
  .article h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
  .article .meta { font-size: 12px; color: var(--fg-dim); margin-bottom: 20px; }
  .article h2 { font-size: 18px; font-weight: 700; margin-top: 28px; margin-bottom: 10px; color: var(--fg); }
  .article p { font-size: 15px; line-height: 1.6; color: var(--fg); margin-bottom: 12px; }
  .article ul, .article ol { margin-left: 18px; margin-bottom: 16px; }
  .article li { font-size: 15px; line-height: 1.6; margin-bottom: 6px; }
  .article strong { color: var(--fg); font-weight: 700; }

  /* Checklist */
  .checklist-item {
    display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .checklist-item input[type="checkbox"] {
    appearance: none; width: 22px; height: 22px; border: 2px solid var(--fg-muted);
    border-radius: 6px; cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: grid; place-items: center;
  }
  .checklist-item input[type="checkbox"]:checked {
    background: var(--success); border-color: var(--success);
  }
  .checklist-item input[type="checkbox"]:checked::after {
    content: '\2713'; color: var(--bg); font-weight: 900; font-size: 14px;
  }
  .checklist-item.checked label { color: var(--fg-dim); text-decoration: line-through; }
  .checklist-item label { font-size: 15px; line-height: 1.5; cursor: pointer; flex: 1; }
  .checklist-section { font-size: 11px; letter-spacing: 0.1em; font-weight: 700; color: var(--accent); margin-top: 24px; margin-bottom: 8px; }

  /* Related */
  .related-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .related-item {
    padding: 10px 14px; background: var(--bg-elev); border-radius: 10px;
    font-size: 14px; cursor: pointer; color: var(--fg-muted); transition: color 0.15s;
  }
  .related-item:hover { color: var(--accent); }

  /* Watermerk achtergrond (alleen op homescreen, niet artikel) */
  .watermark-bg {
    position: absolute; inset: 0; z-index: -1; pointer-events: none;
    opacity: 0.5; overflow: hidden;
  }
  .watermark-bg svg { position: absolute; }
  .watermark-bg .bull-tl { top: -120px; left: -160px; width: 460px; }
  .watermark-bg .bull-br { bottom: -120px; right: -160px; width: 460px; transform: scaleX(-1); }

  /* Login & Loading */
  .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
  .login-logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
  .login-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: center; }
  .login-subtitle { font-size: 14px; color: var(--fg-muted); text-align: center; margin-bottom: 28px; max-width: 320px; line-height: 1.5; }
  .login-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
  .login-form input {
    padding: 14px 16px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
    color: var(--fg); font-size: 16px; font-family: inherit;
  }
  .login-form input:focus { outline: none; border-color: var(--accent); }
  .login-form button {
    padding: 14px 16px; background: var(--accent); border: none; border-radius: 12px;
    color: var(--fg); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: 0.04em;
  }
  .login-form button:hover { background: var(--accent-hover); }
  .login-form button:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-msg { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.5; max-width: 320px; text-align: center; }
  .login-msg.success { background: rgba(52, 211, 153, 0.1); border: 1px solid var(--success); color: var(--success); }
  .login-msg.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }

  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Logout button */
  .user-chip {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px;
    font-size: 12px; cursor: pointer;
  }
  .user-chip:hover { border-color: var(--accent); }
  .user-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

  /* Officieel Bar28 logo via <use> ref */
  .bar28-logo { display: block; }
  .bar28-logo-sm { width: 100px; height: auto; aspect-ratio: 682 / 151; }
  .bar28-logo-lg { width: 280px; height: auto; aspect-ratio: 682 / 151; }
</style>
</head>

<script>
// === Firebase ===
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAZmHyN-VFR0an5naYUSoPn_9YidsVZhiU",
  authDomain: "pachanga-bar.firebaseapp.com",
  databaseURL: "https://pachanga-bar-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pachanga-bar",
  storageBucket: "pachanga-bar.firebasestorage.app",
  messagingSenderId: "321793362029",
  appId: "1:321793362029:web:9fa0e656d08a4e1a8a5764"
};
firebase.initializeApp(FIREBASE_CONFIG);

// === Auth flow (magic link) ===
function showLoading()  { document.getElementById('loadingView').style.display = 'flex'; document.getElementById('loginView').style.display = 'none'; document.getElementById('header').style.display = 'none'; document.getElementById('listView').style.display = 'none'; document.getElementById('detailView').classList.remove('active'); }
function showLogin()    { document.getElementById('loadingView').style.display = 'none'; document.getElementById('loginView').style.display = 'flex'; document.getElementById('header').style.display = 'none'; document.getElementById('listView').style.display = 'none'; document.getElementById('detailView').classList.remove('active'); }
function showApp(user)  {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('listView').style.display = '';
  document.getElementById('userChip').style.display = 'flex';
  document.getElementById('userEmail').textContent = user.email || 'ingelogd';
  renderList(articles);
}

function showLoginMsg(text, type) {
  const el = document.getElementById('loginMsg');
  el.textContent = text;
  el.className = 'login-msg ' + (type || '');
  el.style.display = 'block';
}

function actionCodeSettings() {
  return {
    url: window.location.origin + window.location.pathname,
    handleCodeInApp: true
  };
}

async function sendMagicLink(ev) {
  ev.preventDefault();
  const email = document.getElementById('emailInput').value.trim();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Versturen...';
  try {
    await firebase.auth().sendSignInLinkToEmail(email, actionCodeSettings());
    window.localStorage.setItem('emailForSignIn', email);
    showLoginMsg('Check je inbox bij ' + email + '. Klik op de link om in te loggen. Eventueel kan de mail in je spam belanden.', 'success');
    btn.textContent = 'Verstuurd';
  } catch (err) {
    console.error(err);
    showLoginMsg('Kon geen mail versturen: ' + (err.message || err.code), 'error');
    btn.disabled = false;
    btn.textContent = 'Stuur magic link';
  }
}

async function logout() {
  if (!confirm('Uitloggen?')) return;
  try {
    await firebase.auth().signOut();
    window.localStorage.removeItem('emailForSignIn');
    location.reload();
  } catch (err) {
    console.error(err);
  }
}

async function completeSignInIfLink() {
  if (!firebase.auth().isSignInWithEmailLink(window.location.href)) return false;
  let email = window.localStorage.getItem('emailForSignIn');
  if (!email) {
    email = prompt('Bevestig je e-mailadres om in te loggen:');
  }
  if (!email) return false;
  try {
    await firebase.auth().signInWithEmailLink(email, window.location.href);
    window.localStorage.removeItem('emailForSignIn');
    // Strip query params zodat refresh niet opnieuw signin probeert
    window.history.replaceState({}, document.title, window.location.pathname);
    return true;
  } catch (err) {
    console.error(err);
    showLogin();
    showLoginMsg('Inloggen mislukt: ' + (err.message || err.code), 'error');
    return false;
  }
}

// Init
(async () => {
  showLoading();
  await completeSignInIfLink();
  firebase.auth().onAuthStateChanged(user => {
    if (user) showApp(user);
    else showLogin();
  });
})();

const fuse = new Fuse(articles, {
  keys: [
    { name: 'titel', weight: 3 },
    { name: 'samenvatting', weight: 1.5 },
    { name: 'tags', weight: 2 },
    { name: 'synoniemen', weight: 3 }
  ],
  threshold: 0.4,
  ignoreLocation: true,
  includeScore: true
});

let activeCategory = 'alle';

function renderList(items) {
  const list = document.getElementById('resultList');
  if (!items.length) {
    list.innerHTML = '<div class="empty">Geen resultaten. Probeer een ander zoekwoord.</div>';
    return;
  }
  list.innerHTML = items.map(a => `
    <div class="card" onclick="showDetail('${a.slug}')">
      <div class="card-cat">${a.catLabel}</div>
      <div class="card-title">${a.titel}</div>
      <div class="card-summary">${a.samenvatting}</div>
      <div class="card-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim();
  let items = articles;
  if (activeCategory !== 'alle') items = items.filter(a => a.cat === activeCategory);
  if (q) {
    const results = fuse.search(q);
    items = results.map(r => r.item).filter(a => activeCategory === 'alle' || a.cat === activeCategory);
  }
  renderList(items);
}

function showDetail(slug) {
  const article = articles.find(a => a.slug === slug);
  if (!article) return;
  const body = document.getElementById('articleBody');
  body.innerHTML = article.body;
  document.getElementById('listView').style.display = 'none';
  if (article.isChecklist) {
    const basis = document.getElementById('basis');
    const zouOk = document.getElementById('zou-ok');
    basis.innerHTML = article.checklist.basis.map((item, i) => `
      <div class="checklist-item" onclick="toggleCheck(this)">
        <input type="checkbox" id="b${i}">
        <label for="b${i}">${item}</label>
      </div>
    `).join('');
    zouOk.innerHTML = article.checklist.zouOk.map((item, i) => `
      <div class="checklist-item" onclick="toggleCheck(this)">
        <input type="checkbox" id="z${i}">
        <label for="z${i}">${item}</label>
      </div>
    `).join('');
  }
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  document.getElementById('watermark').style.display = 'none';
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('listView').style.display = '';
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('watermark').style.display = '';
}

function toggleCheck(el) {
  const cb = el.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  el.classList.toggle('checked', cb.checked);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCategory = chip.dataset.cat;
    applyFilters();
  });
});
