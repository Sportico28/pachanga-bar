<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000000">
<title>Bar28 - Pachanga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<style>
  :root {
    --bg: #000000; --bg-elev: #0F0F0F; --bg-elev2: #181818;
    --fg: #FFFFFF; --fg-muted: #A8A8A8; --fg-dim: #6B6B6B;
    --accent: #DC3550; --accent-hover: #E94A65;
    --success: #34D399; --warning: #FBBF24; --danger: #EF4444;
    --border: #1F1F1F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; }
  body { max-width: 520px; margin: 0 auto; position: relative; padding-bottom: 60px; }
  input, textarea, select, button { font-family: inherit; }

  /* Logo */
  .bar28-logo { display: block; }
  .bar28-logo-sm { width: 96px; height: auto; aspect-ratio: 682 / 151; }
  .bar28-logo-lg { width: 260px; height: auto; aspect-ratio: 682 / 151; }

  /* Header */
  .header { position: sticky; top: 0; z-index: 20; background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; color: var(--fg); padding: 7px 9px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .badge { background: var(--accent); color: var(--fg); border-radius: 999px; padding: 0 6px; font-size: 10px; font-weight: 800; }
  .user-chip { display: flex; align-items: center; gap: 7px; padding: 6px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; cursor: pointer; }
  .user-chip:hover { border-color: var(--accent); }
  .user-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

  /* Full screen views */
  .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .login-logo { margin-bottom: 32px; }
  .login-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .login-subtitle { font-size: 14px; color: var(--fg-muted); margin-bottom: 28px; max-width: 320px; line-height: 1.5; }

  /* Forms */
  .form-col { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
  input[type=text], input[type=email], textarea, select {
    width: 100%; padding: 13px 15px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 11px;
    color: var(--fg); font-size: 15px; resize: vertical;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--fg-dim); }
  label.fld { font-size: 12px; font-weight: 600; color: var(--fg-muted); display: block; margin-bottom: 5px; letter-spacing: 0.03em; }
  .btn { padding: 13px 16px; border: none; border-radius: 11px; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.03em; }
  .btn-primary { background: var(--accent); color: var(--fg); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--fg-muted); border-radius: 999px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--fg); }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); border-radius: 999px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-danger:hover { background: var(--danger); color: var(--fg); }
  .msg { padding: 12px 15px; border-radius: 10px; font-size: 13px; line-height: 1.5; margin-top: 14px; }
  .msg.success { background: rgba(52,211,153,0.1); border: 1px solid var(--success); color: var(--success); }
  .msg.error { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); }

  /* Search + chips */
  .search-wrap { padding: 16px 20px 10px; position: relative; }
  .search-input { width: 100%; padding: 14px 16px 14px 44px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; color: var(--fg); font-size: 16px; }
  .search-icon { position: absolute; left: 34px; top: 30px; color: var(--fg-dim); pointer-events: none; }
  .chips { padding: 0 20px 14px; display: flex; gap: 8px; overflow-x: auto; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 8px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg-muted); cursor: pointer; white-space: nowrap; }
  .chip.active { background: var(--accent); color: var(--fg); border-color: var(--accent); }

  /* Article list */
  .list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
  .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 16px; padding: 16px; cursor: pointer; }
  .card:hover { border-color: var(--accent); }
  .card-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; }
  .card-title { font-size: 18px; font-weight: 700; margin-top: 6px; }
  .card-summary { font-size: 14px; color: var(--fg-muted); margin-top: 6px; line-height: 1.4; }
  .card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; background: rgba(255,255,255,0.05); color: var(--fg-dim); }
  .empty { padding: 40px 20px; text-align: center; color: var(--fg-dim); }

  /* Detail / article */
  .detail { display: none; }
  .detail.active { display: block; }
  .back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--bg-elev); border-radius: 999px; font-size: 13px; cursor: pointer; color: var(--fg-muted); margin: 16px 0 0 20px; }
  .back:hover { color: var(--accent); }
  .article { padding: 20px; }
  .article h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
  .article .meta { font-size: 12px; color: var(--fg-dim); margin-bottom: 20px; }
  .article h2 { font-size: 18px; font-weight: 700; margin-top: 28px; margin-bottom: 10px; }
  .article p { font-size: 15px; line-height: 1.6; margin-bottom: 12px; }
  .article ul, .article ol { margin-left: 18px; margin-bottom: 16px; }
  .article li { font-size: 15px; line-height: 1.6; margin-bottom: 6px; }
  .article strong { font-weight: 700; }

  /* Keyword highlight */
  .kw { color: var(--accent); border-bottom: 1px dotted var(--accent); cursor: pointer; font-weight: 600; }
  .kw:hover { background: rgba(220,53,80,0.12); }

  /* Checklist */
  .checklist-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .checklist-item input[type=checkbox] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--fg-muted); border-radius: 6px; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: grid; place-items: center; }
  .checklist-item input[type=checkbox]:checked { background: var(--success); border-color: var(--success); }
  .checklist-item input[type=checkbox]:checked::after { content: '\2713'; color: var(--bg); font-weight: 900; font-size: 14px; }
  .checklist-item.checked label { color: var(--fg-dim); text-decoration: line-through; }
  .checklist-item label { font-size: 15px; line-height: 1.5; cursor: pointer; flex: 1; }
  .checklist-section { font-size: 11px; letter-spacing: 0.1em; font-weight: 700; color: var(--accent); margin-top: 24px; margin-bottom: 8px; }

  /* Popup / modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 24px 20px 32px; }
  @media (min-width: 540px) { .modal-overlay { align-items: center; } .modal { border-radius: 20px; } }
  .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .modal .kw-photo { width: 100%; border-radius: 12px; margin: 14px 0; border: 1px solid var(--border); }
  .modal .kw-uitleg { font-size: 15px; line-height: 1.6; color: var(--fg); }
  .modal-close { float: right; background: var(--bg-elev2); border: none; color: var(--fg-muted); border-radius: 8px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }

  /* Admin */
  .admin-section { padding: 18px 20px; }
  .admin-tabs { display: flex; gap: 6px; padding: 14px 20px 0; overflow-x: auto; }
  .admin-tabs::-webkit-scrollbar { display: none; }
  .admin-tab { flex-shrink: 0; padding: 9px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg-muted); cursor: pointer; white-space: nowrap; }
  .admin-tab.active { background: var(--accent); color: var(--fg); border-color: var(--accent); }
  .admin-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .admin-card .row1 { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .admin-card .name { font-size: 15px; font-weight: 700; }
  .admin-card .email, .admin-card .sub { font-size: 13px; color: var(--fg-muted); }
  .admin-card .reason { font-size: 13px; margin: 8px 0 12px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; line-height: 1.4; }
  .admin-card .meta { font-size: 11px; color: var(--fg-dim); margin: 6px 0 10px; }
  .admin-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .role-pill { font-size: 10px; padding: 3px 8px; border-radius: 999px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .role-pill.admin { background: var(--accent); color: var(--fg); }
  .role-pill.staff { background: rgba(255,255,255,0.05); color: var(--fg-muted); }
  .empty-admin { padding: 26px 20px; text-align: center; color: var(--fg-dim); font-size: 14px; }
  .add-btn { width: 100%; padding: 14px; border: 1px dashed var(--border); background: transparent; color: var(--accent); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 14px; }
  .add-btn:hover { border-color: var(--accent); background: rgba(220,53,80,0.06); }
  .img-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); margin-top: 8px; }
  .help { font-size: 12px; color: var(--fg-dim); margin-top: 4px; line-height: 1.4; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg-elev2); border: 1px solid var(--border); color: var(--fg); padding: 12px 20px; border-radius: 999px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>

<!-- LOGIN -->
<div class="full-screen" id="loginView" style="display:none;">
  <div class="login-logo"><svg class="bar28-logo bar28-logo-lg" aria-label="Bar28"><use href="#bar28-logo"/></svg></div>
  <div class="login-title">Welkom bij Bar28</div>
  <div class="login-subtitle">Log in met je e-mail. Je krijgt een mail met een link, geen wachtwoord nodig.</div>
  <form class="form-col" id="loginForm" onsubmit="sendMagicLink(event)">
    <input type="email" id="emailInput" placeholder="jouw@email.be" required autocomplete="email">
    <button type="submit" class="btn btn-primary" id="loginBtn">Stuur magic link</button>
  </form>
  <div class="msg" id="loginMsg" style="display:none;max-width:320px;"></div>
</div>

<!-- NO ACCESS -->
<div class="full-screen" id="noAccessView" style="display:none;">
  <div class="login-logo"><svg class="bar28-logo bar28-logo-lg" aria-label="Bar28"><use href="#bar28-logo"/></svg></div>
  <div class="login-title">Nog geen toegang</div>
  <div class="login-subtitle">Je e-mail (<strong id="noAccessEmail"></strong>) staat nog niet in de Bar28 personeelslijst. Vraag toegang aan en Bram krijgt je aanvraag.</div>
  <form class="form-col" id="accessRequestForm" onsubmit="submitAccessRequest(event)">
    <input type="text" id="reqName" placeholder="Je naam" required>
    <textarea id="reqReason" placeholder="Korte reden (bv. nieuwe medewerker, start deze week)" required></textarea>
    <button type="submit" class="btn btn-primary" id="reqBtn">Aanvraag versturen</button>
  </form>
  <div class="msg" id="accessMsg" style="display:none;max-width:320px;"></div>
  <button class="btn-ghost" style="margin-top:24px" onclick="logout()">Uitloggen</button>
</div>

<!-- LIST VIEW -->
<div class="list-view" id="listView" style="display:none;">
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" class="search-input" placeholder="Zoek alles (bv. koffie, aperol, fifo)" id="searchInput">
  </div>
  <div class="chips" id="chips"></div>
  <div class="list" id="resultList"></div>
</div>

<!-- DETAIL VIEW -->
<div class="detail" id="detailView">
  <div class="back" onclick="showList()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> Terug</div>
  <article class="article" id="articleBody"></article>
</div>

<!-- ADMIN VIEW -->
<div class="detail" id="adminView">
  <div class="back" onclick="showApp()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg> Terug naar app</div>
  <div class="admin-tabs" id="adminTabs">
    <div class="admin-tab active" data-tab="artikels" onclick="setAdminTab('artikels')">Artikels</div>
    <div class="admin-tab" data-tab="categorieen" onclick="setAdminTab('categorieen')">Categorieën</div>
    <div class="admin-tab" data-tab="keywords" onclick="setAdminTab('keywords')">Keywords</div>
    <div class="admin-tab" data-tab="aanvragen" onclick="setAdminTab('aanvragen')">Aanvragen</div>
    <div class="admin-tab" data-tab="personeel" onclick="setAdminTab('personeel')">Personeel</div>
  </div>
  <div class="admin-section" id="adminContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ Firebase ============
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAZmHyN-VFR0an5naYUSoPn_9YidsVZhiU",
  authDomain: "pachanga-bar.firebaseapp.com",
  databaseURL: "https://pachanga-bar-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pachanga-bar",
  storageBucket: "pachanga-bar.firebasestorage.app",
  messagingSenderId: "321793362029",
  appId: "1:321793362029:web:9fa0e656d08a4e1a8a5764"
};
firebase.initializeApp(FIREBASE_CONFIG);
firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e => console.warn('persist', e));

const BOOTSTRAP_ADMIN_EMAIL = 'bram.denyn@gmail.com';
const db = firebase.database();
const storage = firebase.storage();

// ============ State ============
let currentUser = null, currentRol = null;
let content = { categorieen: {}, artikels: {}, keywords: {} };
let fuse = null;
let activeCategory = 'alle';
let adminTab = 'artikels';

// ============ View helpers ============
function hideAll() {
  ['loadingView','loginView','noAccessView','listView'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('detailView').classList.remove('active');
  document.getElementById('adminView').classList.remove('active');
}
function showLoading() { hideAll(); document.getElementById('loadingView').style.display = 'flex'; document.getElementById('header').style.display = 'none'; }
function showLogin()   { hideAll(); document.getElementById('loginView').style.display = 'flex'; document.getElementById('header').style.display = 'none'; }
function showNoAccess(u){ hideAll(); document.getElementById('noAccessView').style.display='flex'; document.getElementById('noAccessEmail').textContent=u.email; document.getElementById('header').style.display='none'; }
function showApp() {
  hideAll();
  document.getElementById('header').style.display = 'flex';
  document.getElementById('listView').style.display = '';
  document.getElementById('userChip').style.display = 'flex';
  document.getElementById('userEmail').textContent = currentUser.email;
  document.getElementById('adminBtn').style.display = (currentRol==='admin') ? 'flex' : 'none';
  renderChips(); applyFilters();
}
function showDetailView() { hideAll(); document.getElementById('header').style.display='flex'; document.getElementById('detailView').classList.add('active'); }
function showAdmin() { if(currentRol!=='admin')return; hideAll(); document.getElementById('header').style.display='flex'; document.getElementById('adminView').classList.add('active'); renderAdmin(); }

function msg(id, text, type) { const el=document.getElementById(id); el.textContent=text; el.className='msg '+(type||''); el.style.display='block'; }
function toast(text) { const t=document.getElementById('toast'); t.textContent=text; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function emailToSlug(e){ return e.toLowerCase().replace(/\./g,',').replace(/[$#\[\]\/]/g,'_'); }
function fmtDate(ts){ if(!ts)return'?'; const d=new Date(ts); return d.toLocaleDateString('nl-BE')+' '+d.toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'}); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// ============ Auth (magic link) ============
function actionCodeSettings(){ return { url: window.location.origin+window.location.pathname, handleCodeInApp:true }; }
async function sendMagicLink(ev){
  ev.preventDefault();
  const email=document.getElementById('emailInput').value.trim().toLowerCase();
  const btn=document.getElementById('loginBtn'); btn.disabled=true; btn.textContent='Versturen...';
  try {
    await firebase.auth().sendSignInLinkToEmail(email, actionCodeSettings());
    localStorage.setItem('emailForSignIn', email);
    msg('loginMsg','Check je inbox bij '+email+'. Klik de link om in te loggen. Mail kan in spam belanden.','success');
    btn.textContent='Verstuurd';
  } catch(e){ console.error(e); msg('loginMsg','Kon geen mail versturen: '+(e.message||e.code),'error'); btn.disabled=false; btn.textContent='Stuur magic link'; }
}
async function logout(){ if(!confirm('Uitloggen?'))return; try{ await firebase.auth().signOut(); localStorage.removeItem('emailForSignIn'); location.reload(); }catch(e){console.error(e);} }
async function completeSignInIfLink(){
  if(!firebase.auth().isSignInWithEmailLink(window.location.href))return false;
  let email=localStorage.getItem('emailForSignIn'); if(!email)email=prompt('Bevestig je e-mailadres:');
  if(!email)return false;
  try{ await firebase.auth().signInWithEmailLink(email.toLowerCase(), window.location.href); localStorage.removeItem('emailForSignIn'); window.history.replaceState({},document.title,window.location.pathname); return true; }
  catch(e){ console.error(e); showLogin(); msg('loginMsg','Inloggen mislukt: '+(e.message||e.code),'error'); return false; }
}

// ============ Whitelist + bootstrap ============
async function checkAccess(user){
  const slug=emailToSlug(user.email);
  const snap=await db.ref('whitelist/'+slug).once('value');
  if(snap.exists()){
    const d=snap.val();
    if(d.actief){ currentRol=d.rol||'staff'; db.ref('whitelist/'+slug).update({uid:user.uid,lastSeen:firebase.database.ServerValue.TIMESTAMP}).catch(()=>{}); return true; }
    return false;
  }
  if(user.email===BOOTSTRAP_ADMIN_EMAIL){
    const all=await db.ref('whitelist').once('value');
    if(!all.exists()){
      await db.ref('whitelist/'+slug).set({ email:user.email, naam:'Bram De Nyn', rol:'admin', actief:true, uid:user.uid, toegevoegd:firebase.database.ServerValue.TIMESTAMP, toegevoegd_door:'bootstrap', lastSeen:firebase.database.ServerValue.TIMESTAMP });
      currentRol='admin'; return true;
    }
  }
  return false;
}

// ============ Access requests ============
async function submitAccessRequest(ev){
  ev.preventDefault();
  const naam=document.getElementById('reqName').value.trim(), reden=document.getElementById('reqReason').value.trim();
  const btn=document.getElementById('reqBtn'); btn.disabled=true; btn.textContent='Versturen...';
  try{
    await db.ref('access-requests/'+emailToSlug(currentUser.email)).set({ uid:currentUser.uid, email:currentUser.email, naam, reden, gevraagd:firebase.database.ServerValue.TIMESTAMP, status:'pending' });
    msg('accessMsg','Aanvraag verstuurd. Bram krijgt bericht en voegt je toe. Je mag dit venster sluiten.','success');
    document.getElementById('accessRequestForm').style.display='none';
  }catch(e){ console.error(e); msg('accessMsg','Aanvraag mislukt: '+(e.message||e.code),'error'); btn.disabled=false; btn.textContent='Aanvraag versturen'; }
}

// ============ Content laden (Firebase + cache) ============
function cacheContent(){ try{ localStorage.setItem('bar28_content', JSON.stringify(content)); }catch(e){} }
function loadCachedContent(){ try{ const c=localStorage.getItem('bar28_content'); if(c){ content=JSON.parse(c); buildFuse(); } }catch(e){} }
function buildFuse(){
  const arr=Object.values(content.artikels||{});
  fuse=new Fuse(arr,{ keys:[{name:'titel',weight:3},{name:'samenvatting',weight:1.5},{name:'tags',weight:2},{name:'synoniemen',weight:3}], threshold:0.4, ignoreLocation:true });
}
function listenContent(){
  db.ref('content').on('value', snap=>{
    const v=snap.val()||{};
    content={ categorieen:v.categorieen||{}, artikels:v.artikels||{}, keywords:v.keywords||{} };
    cacheContent(); buildFuse();
    // Als we in de lijst zitten, herrender
    if(document.getElementById('listView').style.display!=='none'){ renderChips(); applyFilters(); }
    if(document.getElementById('adminView').classList.contains('active')) renderAdmin();
  });
}

// ============ List + render ============
function catLabel(catSlug){ const c=Object.values(content.categorieen).find(x=>x.slug===catSlug); return c?c.naam_nl:catSlug; }
function renderChips(){
  const cats=Object.values(content.categorieen).sort((a,b)=>(a.volgorde||0)-(b.volgorde||0));
  let html='<div class="chip '+(activeCategory==='alle'?'active':'')+'" onclick="setCat(\'alle\')">Alle</div>';
  html+=cats.map(c=>`<div class="chip ${activeCategory===c.slug?'active':''}" onclick="setCat('${c.slug}')">${escapeHtml(c.naam_nl)}</div>`).join('');
  document.getElementById('chips').innerHTML=html;
}
function setCat(slug){ activeCategory=slug; renderChips(); applyFilters(); }
function applyFilters(){
  const q=document.getElementById('searchInput').value.trim();
  let items=Object.values(content.artikels);
  if(activeCategory!=='alle') items=items.filter(a=>a.categorie===activeCategory);
  if(q && fuse){ const res=fuse.search(q); items=res.map(r=>r.item).filter(a=>activeCategory==='alle'||a.categorie===activeCategory); }
  items.sort((a,b)=>(a.titel||'').localeCompare(b.titel||''));
  renderList(items);
}
function renderList(items){
  const el=document.getElementById('resultList');
  if(!items.length){ el.innerHTML='<div class="empty">Geen resultaten.</div>'; return; }
  el.innerHTML=items.map(a=>`
    <div class="card" onclick="openArticle('${a.id}')">
      <div class="card-cat">${escapeHtml(catLabel(a.categorie))}</div>
      <div class="card-title">${escapeHtml(a.titel)}</div>
      <div class="card-summary">${escapeHtml(a.samenvatting||'')}</div>
      <div class="card-tags">${(a.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
    </div>`).join('');
}

// ============ Keyword highlighting ============
function highlightKeywords(html){
  const kws=Object.values(content.keywords);
  if(!kws.length) return html;
  // Bouw lijst van {term, id}, langste eerst zodat 'groot glas' voor 'glas' matcht
  const terms=[];
  kws.forEach(kw=>{
    [kw.woord, ...(kw.aliassen||[])].forEach(t=>{ if(t) terms.push({term:t, id:kw.id}); });
  });
  terms.sort((a,b)=>b.term.length-a.term.length);
  // Splits HTML op tags zodat we niet binnen tags vervangen
  const parts=html.split(/(<[^>]+>)/);
  const used=new Set();
  for(let i=0;i<parts.length;i++){
    if(parts[i].startsWith('<')) continue;
    let text=parts[i];
    terms.forEach(({term,id})=>{
      if(used.has(id)) return; // elk keyword max 1x per artikel highlighten
      const re=new RegExp('\\b('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')\\b','i');
      if(re.test(text)){
        text=text.replace(re,`<span class="kw" onclick="openKeyword('${id}')">$1</span>`);
        used.add(id);
      }
    });
    parts[i]=text;
  }
  return parts.join('');
}

function openArticle(id){
  const a=content.artikels[id]; if(!a)return;
  let body=`<h1>${escapeHtml(a.titel)}</h1><div class="meta">${escapeHtml(catLabel(a.categorie))} · gewijzigd ${a.laatst_gewijzigd||''}</div>`;
  if(a.hero_image) body+=`<img class="kw-photo" src="${escapeHtml(a.hero_image)}" alt="">`;
  if(a.isChecklist && a.checklist){
    if(a.intro) body+=`<p>${escapeHtml(a.intro)}</p>`;
    body+=`<div class="checklist-section">BASIS</div>`;
    body+=(a.checklist.basis||[]).map((it,i)=>`<div class="checklist-item" onclick="toggleCheck(this)"><input type="checkbox" id="cb${i}"><label for="cb${i}">${highlightKeywords(escapeHtml(it))}</label></div>`).join('');
    if((a.checklist.zouOk||[]).length){
      body+=`<div class="checklist-section">ZOU OK MOETEN ZIJN, MAAR DOEN INDIEN NIET OK</div>`;
      body+=(a.checklist.zouOk||[]).map((it,i)=>`<div class="checklist-item" onclick="toggleCheck(this)"><input type="checkbox" id="cz${i}"><label for="cz${i}">${highlightKeywords(escapeHtml(it))}</label></div>`).join('');
    }
  } else {
    body+=highlightKeywords(a.body||'');
  }
  body+=`<div class="modal-actions"><button class="btn-ghost" onclick="suggestKeyword('${a.id}')">Een woord verduidelijken?</button></div>`;
  document.getElementById('articleBody').innerHTML=body;
  showDetailView(); window.scrollTo(0,0);
}
function toggleCheck(el){ const cb=el.querySelector('input'); cb.checked=!cb.checked; el.classList.toggle('checked',cb.checked); }

// ============ Keyword popup ============
function openKeyword(id){
  const kw=content.keywords[id]; if(!kw)return;
  let html=`<button class="modal-close" onclick="closeModal()">&times;</button><h3>${escapeHtml(kw.woord)}</h3>`;
  if(kw.foto) html+=`<img class="kw-photo" src="${escapeHtml(kw.foto)}" alt="">`;
  html+=`<div class="kw-uitleg">${escapeHtml(kw.uitleg||'Geen uitleg toegevoegd.')}</div>`;
  openModal(html);
}
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modalOverlay').classList.add('open'); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

// ============ Keyword suggestie door personeel ============
function suggestKeyword(artikelId){
  const a=content.artikels[artikelId];
  openModal(`<button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>Woord laten verduidelijken</h3>
    <p class="help" style="margin-bottom:14px">Welk woord in "${escapeHtml(a?a.titel:'')}" zou je willen dat we uitleggen met een foto of beschrijving?</p>
    <div class="form-col" style="max-width:none">
      <input type="text" id="sugWoord" placeholder="Bv. tassenverwarmer">
      <textarea id="sugTekst" placeholder="Optioneel: wat is er onduidelijk?"></textarea>
      <button class="btn btn-primary" onclick="sendKeywordSuggestion('${artikelId}')">Voorstel versturen</button>
    </div>`);
}
async function sendKeywordSuggestion(artikelId){
  const woord=document.getElementById('sugWoord').value.trim();
  if(!woord){ toast('Vul een woord in'); return; }
  const tekst=document.getElementById('sugTekst').value.trim();
  try{
    await db.ref('keyword-suggesties/'+uid()).set({ woord, tekst, artikel:artikelId, door:currentUser.email, gevraagd:firebase.database.ServerValue.TIMESTAMP });
    closeModal(); toast('Voorstel verstuurd, bedankt');
  }catch(e){ console.error(e); toast('Versturen mislukt'); }
}

// ============ ADMIN ============
function setAdminTab(tab){ adminTab=tab; document.querySelectorAll('.admin-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab)); renderAdmin(); }
function renderAdmin(){
  const el=document.getElementById('adminContent');
  if(adminTab==='artikels') renderAdminArtikels(el);
  else if(adminTab==='categorieen') renderAdminCategorieen(el);
  else if(adminTab==='keywords') renderAdminKeywords(el);
  else if(adminTab==='aanvragen') renderAdminAanvragen(el);
  else if(adminTab==='personeel') renderAdminPersoneel(el);
}

// ---- Artikels ----
function renderAdminArtikels(el){
  const arr=Object.values(content.artikels).sort((a,b)=>(a.titel||'').localeCompare(b.titel||''));
  el.innerHTML=`<button class="add-btn" onclick="editArtikel()">+ Nieuw artikel</button>`+
    (arr.length?arr.map(a=>`<div class="admin-card"><div class="row1"><div><div class="name">${escapeHtml(a.titel)}</div><div class="sub">${escapeHtml(catLabel(a.categorie))}${a.isChecklist?' · checklist':''}</div></div></div><div class="actions" style="margin-top:10px"><button class="btn-ghost" onclick="editArtikel('${a.id}')">Bewerken</button><button class="btn-danger" onclick="deleteArtikel('${a.id}','${escapeHtml(a.titel)}')">Verwijderen</button></div></div>`).join(''):'<div class="empty-admin">Nog geen artikels.</div>');
}
function editArtikel(id){
  const a=id?content.artikels[id]:{ id:uid(), titel:'', categorie:Object.values(content.categorieen)[0]?.slug||'', samenvatting:'', tags:[], synoniemen:[], body:'', isChecklist:false, checklist:{basis:[],zouOk:[]} };
  const cats=Object.values(content.categorieen).sort((a,b)=>(a.volgorde||0)-(b.volgorde||0));
  openModal(`<button class="modal-close" onclick="closeModal()">&times;</button><h3>${id?'Artikel bewerken':'Nieuw artikel'}</h3>
    <div class="form-col" style="max-width:none;margin-top:14px">
      <div><label class="fld">Titel</label><input type="text" id="aTitel" value="${escapeHtml(a.titel)}"></div>
      <div><label class="fld">Categorie</label><select id="aCat">${cats.map(c=>`<option value="${c.slug}" ${a.categorie===c.slug?'selected':''}>${escapeHtml(c.naam_nl)}</option>`).join('')}</select></div>
      <div><label class="fld">Samenvatting (1 regel)</label><input type="text" id="aSum" value="${escapeHtml(a.samenvatting||'')}"></div>
      <div><label class="fld">Tags (komma-gescheiden)</label><input type="text" id="aTags" value="${escapeHtml((a.tags||[]).join(', '))}"></div>
      <div><label class="fld">Synoniemen / zoekwoorden (komma-gescheiden)</label><input type="text" id="aSyn" value="${escapeHtml((a.synoniemen||[]).join(', '))}"></div>
      <div><label class="fld"><input type="checkbox" id="aIsCheck" ${a.isChecklist?'checked':''} onchange="document.getElementById('checkFields').style.display=this.checked?'block':'none';document.getElementById('bodyField').style.display=this.checked?'none':'block'"> Dit is een checklist</label></div>
      <div id="bodyField" style="display:${a.isChecklist?'none':'block'}"><label class="fld">Tekst (HTML toegestaan: &lt;h2&gt; &lt;p&gt; &lt;ul&gt;&lt;li&gt; &lt;strong&gt;)</label><textarea id="aBody" style="min-height:160px">${escapeHtml(a.body||'')}</textarea></div>
      <div id="checkFields" style="display:${a.isChecklist?'block':'none'}">
        <label class="fld">BASIS items (één per regel)</label><textarea id="aBasis" style="min-height:120px">${escapeHtml((a.checklist?.basis||[]).join('\n'))}</textarea>
        <label class="fld" style="margin-top:10px">ZOU-OK items (één per regel)</label><textarea id="aZouOk" style="min-height:80px">${escapeHtml((a.checklist?.zouOk||[]).join('\n'))}</textarea>
      </div>
      <div><label class="fld">Hoofdfoto (optioneel)</label><input type="file" accept="image/*" id="aImgFile" onchange="previewImg(this,'aImgPrev')"><input type="text" id="aImg" placeholder="of plak een foto-URL" value="${escapeHtml(a.hero_image||'')}" style="margin-top:8px"><img id="aImgPrev" class="img-preview" style="display:${a.hero_image?'block':'none'}" src="${escapeHtml(a.hero_image||'')}"></div>
      <button class="btn btn-primary" id="aSaveBtn" onclick="saveArtikel('${a.id}',${id?true:false})">Opslaan</button>
    </div>`);
}
async function saveArtikel(id, isEdit){
  const btn=document.getElementById('aSaveBtn'); btn.disabled=true; btn.textContent='Opslaan...';
  try{
    const isCheck=document.getElementById('aIsCheck').checked;
    let img=document.getElementById('aImg').value.trim();
    const file=document.getElementById('aImgFile').files[0];
    if(file) img=await uploadImage(file,'artikels/'+id);
    const data={
      id, titel:document.getElementById('aTitel').value.trim(), categorie:document.getElementById('aCat').value,
      samenvatting:document.getElementById('aSum').value.trim(),
      tags:document.getElementById('aTags').value.split(',').map(s=>s.trim()).filter(Boolean),
      synoniemen:document.getElementById('aSyn').value.split(',').map(s=>s.trim()).filter(Boolean),
      isChecklist:isCheck, hero_image:img||null,
      laatst_gewijzigd:new Date().toLocaleDateString('nl-BE'), auteur:currentUser.email
    };
    if(isCheck){ data.checklist={ basis:document.getElementById('aBasis').value.split('\n').map(s=>s.trim()).filter(Boolean), zouOk:document.getElementById('aZouOk').value.split('\n').map(s=>s.trim()).filter(Boolean) }; data.body=null; }
    else { data.body=document.getElementById('aBody').value; data.checklist=null; }
    if(!data.titel){ toast('Titel verplicht'); btn.disabled=false; btn.textContent='Opslaan'; return; }
    await db.ref('content/artikels/'+id).set(data);
    closeModal(); toast(isEdit?'Artikel bijgewerkt':'Artikel toegevoegd');
  }catch(e){ console.error(e); toast('Opslaan mislukt: '+(e.message||e.code)); btn.disabled=false; btn.textContent='Opslaan'; }
}
async function deleteArtikel(id,titel){ if(!confirm('Artikel "'+titel+'" verwijderen?'))return; await db.ref('content/artikels/'+id).remove(); toast('Verwijderd'); }

// ---- Categorieen ----
function renderAdminCategorieen(el){
  const arr=Object.values(content.categorieen).sort((a,b)=>(a.volgorde||0)-(b.volgorde||0));
  el.innerHTML=`<button class="add-btn" onclick="editCat()">+ Nieuwe categorie</button>`+
    (arr.length?arr.map(c=>`<div class="admin-card"><div class="row1"><div><div class="name">${escapeHtml(c.naam_nl)}</div><div class="sub">${escapeHtml(c.slug)}</div></div></div><div class="actions" style="margin-top:10px"><button class="btn-ghost" onclick="editCat('${c.id}')">Bewerken</button><button class="btn-danger" onclick="deleteCat('${c.id}','${escapeHtml(c.naam_nl)}')">Verwijderen</button></div></div>`).join(''):'<div class="empty-admin">Nog geen categorieën.</div>');
}
function editCat(id){
  const c=id?content.categorieen[id]:{ id:uid(), slug:'', naam_nl:'', naam_en:'', volgorde:Object.keys(content.categorieen).length+1 };
  openModal(`<button class="modal-close" onclick="closeModal()">&times;</button><h3>${id?'Categorie bewerken':'Nieuwe categorie'}</h3>
    <div class="form-col" style="max-width:none;margin-top:14px">
      <div><label class="fld">Naam (NL)</label><input type="text" id="cNl" value="${escapeHtml(c.naam_nl)}"></div>
      <div><label class="fld">Naam (EN)</label><input type="text" id="cEn" value="${escapeHtml(c.naam_en||'')}"></div>
      <div><label class="fld">Slug (kleine letters, streepjes)</label><input type="text" id="cSlug" value="${escapeHtml(c.slug)}"><div class="help">Wordt automatisch gevuld als je leeg laat.</div></div>
      <div><label class="fld">Volgorde</label><input type="text" id="cVol" value="${c.volgorde||1}"></div>
      <button class="btn btn-primary" onclick="saveCat('${c.id}')">Opslaan</button>
    </div>`);
}
async function saveCat(id){
  const nl=document.getElementById('cNl').value.trim();
  if(!nl){ toast('Naam verplicht'); return; }
  let slug=document.getElementById('cSlug').value.trim() || nl.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  await db.ref('content/categorieen/'+id).set({ id, slug, naam_nl:nl, naam_en:document.getElementById('cEn').value.trim(), volgorde:parseInt(document.getElementById('cVol').value)||1 });
  closeModal(); toast('Categorie opgeslagen');
}
async function deleteCat(id,naam){ if(!confirm('Categorie "'+naam+'" verwijderen? Artikels blijven bestaan maar verliezen hun categorie.'))return; await db.ref('content/categorieen/'+id).remove(); toast('Verwijderd'); }

// ---- Keywords ----
function renderAdminKeywords(el){
  const arr=Object.values(content.keywords).sort((a,b)=>(a.woord||'').localeCompare(b.woord||''));
  let html=`<button class="add-btn" onclick="editKeyword()">+ Nieuw keyword</button>`;
  // Suggesties van personeel
  db.ref('keyword-suggesties').once('value').then(snap=>{
    const sug=snap.val()||{};
    const sEl=document.getElementById('kwSuggesties');
    if(!sEl)return;
    const entries=Object.entries(sug);
    sEl.innerHTML=entries.length? '<h2 style="font-size:13px;color:var(--warning);margin:18px 0 10px;text-transform:uppercase;letter-spacing:0.05em">Voorstellen van personeel</h2>'+entries.map(([k,s])=>`<div class="admin-card"><div class="name">${escapeHtml(s.woord)}</div><div class="sub">${escapeHtml(s.tekst||'')}</div><div class="meta">door ${escapeHtml(s.door||'?')} · ${fmtDate(s.gevraagd)}</div><div class="actions"><button class="btn-ghost" onclick="editKeywordFromSuggestion('${k}','${escapeHtml(s.woord)}')">Keyword aanmaken</button><button class="btn-danger" onclick="dismissSuggestion('${k}')">Negeren</button></div></div>`).join(''):'';
  });
  html+=arr.length?arr.map(k=>`<div class="admin-card"><div class="row1"><div><div class="name">${escapeHtml(k.woord)}</div><div class="sub">${escapeHtml((k.aliassen||[]).join(', '))}</div></div></div><div class="actions" style="margin-top:10px"><button class="btn-ghost" onclick="editKeyword('${k.id}')">Bewerken</button><button class="btn-danger" onclick="deleteKeyword('${k.id}','${escapeHtml(k.woord)}')">Verwijderen</button></div></div>`).join(''):'<div class="empty-admin">Nog geen keywords.</div>';
  html+='<div id="kwSuggesties"></div>';
  el.innerHTML=html;
}
function editKeyword(id, prefillWoord){
  const k=id?content.keywords[id]:{ id:uid(), woord:prefillWoord||'', aliassen:[], uitleg:'', foto:'' };
  openModal(`<button class="modal-close" onclick="closeModal()">&times;</button><h3>${id?'Keyword bewerken':'Nieuw keyword'}</h3>
    <div class="form-col" style="max-width:none;margin-top:14px">
      <div><label class="fld">Woord</label><input type="text" id="kWoord" value="${escapeHtml(k.woord)}"></div>
      <div><label class="fld">Aliassen / andere schrijfwijzen (komma-gescheiden)</label><input type="text" id="kAlias" value="${escapeHtml((k.aliassen||[]).join(', '))}"><div class="help">Bv. voor "Jigger": maatbeker, schenkmaat</div></div>
      <div><label class="fld">Uitleg</label><textarea id="kUitleg" style="min-height:100px">${escapeHtml(k.uitleg||'')}</textarea></div>
      <div><label class="fld">Foto (optioneel)</label><input type="file" accept="image/*" id="kImgFile" onchange="previewImg(this,'kImgPrev')"><input type="text" id="kImg" placeholder="of plak een foto-URL" value="${escapeHtml(k.foto||'')}" style="margin-top:8px"><img id="kImgPrev" class="img-preview" style="display:${k.foto?'block':'none'}" src="${escapeHtml(k.foto||'')}"></div>
      <button class="btn btn-primary" id="kSaveBtn" onclick="saveKeyword('${k.id}')">Opslaan</button>
    </div>`);
}
function editKeywordFromSuggestion(sugKey, woord){ editKeyword(null, woord); window._pendingSugKey=sugKey; }
async function saveKeyword(id){
  const btn=document.getElementById('kSaveBtn'); btn.disabled=true; btn.textContent='Opslaan...';
  try{
    const woord=document.getElementById('kWoord').value.trim();
    if(!woord){ toast('Woord verplicht'); btn.disabled=false; btn.textContent='Opslaan'; return; }
    let img=document.getElementById('kImg').value.trim();
    const file=document.getElementById('kImgFile').files[0];
    if(file) img=await uploadImage(file,'keywords/'+id);
    await db.ref('content/keywords/'+id).set({ id, woord, aliassen:document.getElementById('kAlias').value.split(',').map(s=>s.trim()).filter(Boolean), uitleg:document.getElementById('kUitleg').value.trim(), foto:img||null });
    if(window._pendingSugKey){ await db.ref('keyword-suggesties/'+window._pendingSugKey).remove(); window._pendingSugKey=null; }
    closeModal(); toast('Keyword opgeslagen');
  }catch(e){ console.error(e); toast('Opslaan mislukt: '+(e.message||e.code)); btn.disabled=false; btn.textContent='Opslaan'; }
}
async function deleteKeyword(id,woord){ if(!confirm('Keyword "'+woord+'" verwijderen?'))return; await db.ref('content/keywords/'+id).remove(); toast('Verwijderd'); }
async function dismissSuggestion(key){ await db.ref('keyword-suggesties/'+key).remove(); renderAdmin(); }

// ---- Foto upload ----
function previewImg(input, prevId){ const f=input.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ const p=document.getElementById(prevId); p.src=e.target.result; p.style.display='block'; }; r.readAsDataURL(f); }
async function uploadImage(file, path){
  const ref=storage.ref(path+'_'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9.]/g,'_'));
  const snap=await ref.put(file);
  return await snap.ref.getDownloadURL();
}

// ---- Aanvragen ----
function renderAdminAanvragen(el){
  db.ref('access-requests').once('value').then(snap=>{
    const data=snap.val()||{};
    const entries=Object.entries(data);
    el.innerHTML=entries.length?entries.map(([slug,r])=>`<div class="admin-card"><div class="name">${escapeHtml(r.naam||'?')}</div><div class="email">${escapeHtml(r.email)}</div><div class="meta">Gevraagd ${fmtDate(r.gevraagd)}</div><div class="reason">${escapeHtml(r.reden||'(geen reden)')}</div><div class="actions"><button class="btn btn-primary" style="padding:8px 14px;font-size:13px" onclick="approveRequest('${slug}','staff')">Goedkeuren</button><button class="btn-ghost" onclick="approveRequest('${slug}','admin')">Als admin</button><button class="btn-danger" onclick="rejectRequest('${slug}')">Weigeren</button></div></div>`).join(''):'<div class="empty-admin">Geen openstaande aanvragen.</div>';
  });
}
async function approveRequest(slug,rol){
  const snap=await db.ref('access-requests/'+slug).once('value'); if(!snap.exists())return;
  const r=snap.val();
  await db.ref('whitelist/'+slug).set({ email:r.email, naam:r.naam, rol, actief:true, uid:r.uid||null, toegevoegd:firebase.database.ServerValue.TIMESTAMP, toegevoegd_door:currentUser.email });
  await db.ref('access-requests/'+slug).remove();
  toast('Goedgekeurd'); renderAdmin();
}
async function rejectRequest(slug){ if(!confirm('Aanvraag weigeren?'))return; await db.ref('access-requests/'+slug).remove(); toast('Geweigerd'); renderAdmin(); }

// ---- Personeel ----
function renderAdminPersoneel(el){
  db.ref('whitelist').once('value').then(snap=>{
    const data=snap.val()||{}; const entries=Object.entries(data).sort((a,b)=>(a[1].naam||'').localeCompare(b[1].naam||''));
    el.innerHTML=entries.length?entries.map(([slug,p])=>`<div class="admin-card"><div class="row1"><div><div class="name">${escapeHtml(p.naam||'?')} <span class="role-pill ${p.rol}">${p.rol}</span></div><div class="email">${escapeHtml(p.email)}</div></div></div><div class="meta">Toegevoegd ${fmtDate(p.toegevoegd)}${p.lastSeen?' · laatst gezien '+fmtDate(p.lastSeen):' · nog niet ingelogd'}</div><div class="actions">${p.actief?`<button class="btn-danger" onclick="setActief('${slug}',false,'${escapeHtml(p.naam||p.email)}')">Toegang intrekken</button>`:`<button class="btn-ghost" onclick="setActief('${slug}',true)">Heractiveren</button>`}</div></div>`).join(''):'<div class="empty-admin">Nog geen personeel.</div>';
  });
}
async function setActief(slug,val,naam){ if(!val && !confirm('Toegang intrekken voor '+naam+'?'))return; await db.ref('whitelist/'+slug).update({actief:val}); toast(val?'Geheractiveerd':'Toegang ingetrokken'); renderAdmin(); }

// ============ Seed (voorbeeldcontent) ============

// ============ Init ============
(async () => {
  loadCachedContent();
  showLoading();
  await completeSignInIfLink();
  firebase.auth().onAuthStateChanged(async user => {
    if(!user){ showLogin(); return; }
    currentUser=user; showLoading();
    try{
      const ok=await checkAccess(user);
      if(ok){
        listenContent();
        if(currentRol==='admin'){
          db.ref('access-requests').on('value', s=>{ const c=s.numChildren(); const b=document.getElementById('adminBadge'); b.textContent=c; b.style.display=c?'inline-block':'none'; });
          await seedIfEmpty();
        }
        showApp();
      } else { showNoAccess(user); }
    }catch(e){ console.error('checkAccess',e); showNoAccess(user); }
  });
})();

document.getElementById('searchInput').addEventListener('input', applyFilters);
